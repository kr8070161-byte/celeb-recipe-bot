name: Daily Threads Publisher

on:
  push:
    branches:
      - main
  schedule:
    # 매일 KST 저녁 7시 (UTC 오전 10시) 실행
    - cron: '0 10 * * *'
  workflow_dispatch: # 깃허브에서 수동 실행 가능하도록 허용

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 큐 상태 갱신 후 리포지토리에 푸시할 권한 부여

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Python dependencies
        run: pip install requests Pillow google-generativeai python-dotenv

      - name: Pre-generate recipe card images
        run: node src/pre-generate.js

      - name: Commit and push generated cards
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/generated-images/ data/queue.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Pre-generate recipe cards [skip ci]" && git push)

      - name: Run publishing script
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          COUPANG_ACCESS_KEY: ${{ secrets.COUPANG_ACCESS_KEY }}
          COUPANG_SECRET_KEY: ${{ secrets.COUPANG_SECRET_KEY }}
          COUPANG_SUB_ID: ${{ secrets.COUPANG_SUB_ID }}
        run: node src/cron-publish.js

      - name: Commit and push final publishing logs
        run: |
          git add data/queue.json data/history.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update publishing queue and history [skip ci]" && git push)
